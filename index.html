<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ממלכת פיצת השברים של טליה!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Rubik:wght@700;900&display=swap');

        body {
            font-family: 'Rubik', 'Assistant', sans-serif;
            background: radial-gradient(circle, #2b1055, #7597de);
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            color: #ffbc00;
            font-size: 3rem;
            margin-bottom: 5px;
            text-shadow: 0 4px 15px rgba(255, 188, 0, 0.4);
        }

        /* כפתור מוזיקה */
        #music-control {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            transition: all 0.2s;
        }
        #music-control:hover {
            background: white;
            color: #2b1055;
        }

        /* מסכים */
        .screen {
            display: none;
            max-width: 600px;
            margin: 30px auto;
            background: rgba(22, 36, 71, 0.95);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border: 3px solid #ffbc00;
        }

        .screen.active {
            display: block;
        }

        /* כפתורי תפריט */
        .menu-btn {
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 20px;
            margin: 10px;
            cursor: pointer;
            width: 80%;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(255, 69, 0, 0.4);
        }

        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 69, 0, 0.6);
        }

        .home-btn {
            background: #e43f5a;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* אזור דמויות */
        #customer-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1f4068;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 2px dashed #00bfff;
        }

        #customer-avatar {
            font-size: 4rem;
            margin-left: 20px;
            animation: bounce 2s infinite ease-in-out;
        }

        #customer-bubble {
            background: white;
            color: #333;
            padding: 15px;
            border-radius: 15px;
            position: relative;
            font-size: 1.2rem;
            font-weight: bold;
            flex-grow: 1;
            text-align: right;
        }

        /* שברים */
        .fraction {
            display: inline-block;
            vertical-align: middle;
            text-align: center;
            font-weight: 900;
            font-size: 1.8rem;
            color: #e43f5a;
            direction: ltr; 
            margin: 0 5px;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 8px;
        }
        .numerator { border-bottom: 3px solid #162447; padding: 0 3px; }
        .denominator { padding: 0 3px; }

        /* פיצה */
        #pizza-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
            background: #cd853f; 
            border-radius: 50%;
            padding: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        svg { width: 100%; height: 100%; display: block; }

        .slice {
            fill: #fff0d4;
            stroke: #d0a370;
            stroke-width: 1.5;
            cursor: pointer;
            transition: fill 0.1s;
        }

        .slice:hover { fill: #ffe4b5; }
        .slice.pepperoni { fill: url(#pepperoni-pattern); }

        /* פופ-אפים */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            z-index: 1000;
            width: 80%;
            max-width: 400px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.active {
            display: block;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal h2 { margin-top: 0; font-size: 2rem; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }
        .modal-overlay.active { display: block; }

        .serve-btn {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white; border: none; padding: 12px 35px;
            font-size: 1.3rem; font-weight: bold; border-radius: 25px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(76,175,80,0.4);
        }

        #stats-bar {
            display: flex; justify-content: space-around; margin-top: 20px;
            font-size: 1.1rem; background: #1f4068; padding: 10px; border-radius: 15px;
        }

        /* עיצוב ארון פרסים */
        #prizes-shelf {
            margin-top: 20px;
            background: #162447;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #ffbc00;
        }
        .prize-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .prize-item {
            font-size: 2rem;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.2;
            transition: transform 0.3s, opacity 0.3s;
        }
        .prize-item.unlocked {
            opacity: 1;
            background: rgba(255, 188, 0, 0.2);
            box-shadow: 0 0 10px rgba(255, 188, 0, 0.5);
            transform: scale(1.1);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .confetti {
            position: absolute; width: 10px; height: 10px;
            animation: fall 1.5s linear forwards; pointer-events: none; z-index: 9999;
        }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <button id="music-control" onclick="toggleMusic()">🎵 מוזיקה: כבויה</button>

    <h1>🍕 מטבח הפיצה של טליה! 🍕</h1>

    <!-- מסך בית -->
    <div id="home-screen" class="screen active">
        <h2>ברוכה הבאה השפית טליה! בחרי רמת קושי:</h2>
        <button class="menu-btn" onclick="startGame('easy')">👶 טליה המתחילה (קל מאוד)</button>
        <button class="menu-btn" onclick="startGame('medium')">👨‍🍳 טליה הסו-שפית (בינוני)</button>
        <button class="menu-btn" onclick="startGame('hard')">👑 טליה המאסטר שפית (קשה)</button>
        <button class="menu-btn" onclick="startGame('expert')">👾 טליה נגד מפלצת השברים (מומחה!)</button>

        <!-- ארון פרסים במסך הראשי -->
        <div id="prizes-shelf">
            <h3>🏆 ארון הפרסים והפרסים של טליה:</h3>
            <div class="prize-grid">
                <div class="prize-item" id="prize-1" title="מערוך הזהב של טליה">🥖</div>
                <div class="prize-item" id="prize-2" title="פטרית הקסם האלופה">🍄</div>
                <div class="prize-item" id="prize-3" title="רוטב סודי מנצנץ">🥫</div>
                <div class="prize-item" id="prize-4" title="בצק דיסקו זוהר">✨</div>
                <div class="prize-item" id="prize-5" title="כתר מאסטר שפית שברים">👑</div>
            </div>
            <p id="prize-status-text" style="font-size:0.9rem; margin-top:10px; color:#ffbc00;"></p>
        </div>
    </div>

    <!-- מסך משחק -->
    <div id="game-screen" class="screen">
        <button class="home-btn" onclick="returnToHome()">🏠 חזרה למסך הבית</button>
        
        <div id="customer-zone">
            <div id="customer-avatar">🦊</div>
            <div id="customer-bubble">
                <span id="customer-name">שועל רעב</span>: "היי השפית טליה! אני רוצה שחלק של 
                <div class="fraction">
                    <div class="numerator" id="req-num">1</div>
                    <div class="denominator" id="req-den">2</div>
                </div> 
                מהפיצה שלי יהיה עם פפרוני!"
                <div id="hint-text" style="font-size: 0.85rem; color: #ff8c00; margin-top: 5px;"></div>
            </div>
        </div>

        <div id="pizza-wrapper">
            <svg id="pizza-svg" viewBox="0 0 100 100">
                <defs>
                    <pattern id="pepperoni-pattern" width="15" height="15" patternUnits="userSpaceOnUse">
                        <rect width="15" height="15" fill="#e43f5a"/>
                        <circle cx="4" cy="4" r="2" fill="#900"/>
                        <circle cx="11" cy="10" r="2" fill="#900"/>
                    </pattern>
                </defs>
                <g id="slices-group"></g>
            </svg>
        </div>

        <button class="serve-btn" onclick="checkAnswer()">טליה, הגשי את הפיצה! 🍽️</button>

        <div id="stats-bar">
            <div>⭐ ניקוד של טליה: <span id="score" style="color:#4caf50;">0</span></div>
            <div>🔥 רצף הצלחות: <span id="streak" style="color:#ffbc00;">0</span></div>
        </div>
    </div>

    <!-- פופ-אפים -->
    <div id="modal-overlay" class="modal-overlay"></div>
    
    <div id="success-modal" class="modal" style="border: 5px solid #4caf50;">
        <h2 style="color: #4caf50;">🎉 כל הכבוד, טליה! 🎉</h2>
        <p id="success-text" style="font-size: 1.2rem; font-weight: bold;"></p>
        <p id="prize-unlock-text" style="color: #ffbc00; font-weight: bold;"></p>
        <span id="success-emoji" style="font-size: 4rem;">🤩</span>
        <br><br>
        <button class="serve-btn" onclick="closeModal('success-modal')">הלקוח הבא מחכה לטליה! ←</button>
    </div>

    <div id="fail-modal" class="modal" style="border: 5px solid #e43f5a;">
        <h2 style="color: #e43f5a;">💡 טליה, בואי נתקן ביחד!</h2>
        <p id="fail-text" style="font-size: 1.1rem; color: #333;"></p>
        <p id="helper-text" style="font-weight: bold; color: #162447; background:#fff0d4; padding:8px; border-radius:10px;"></p>
        <span style="font-size: 4rem;">🧐</span>
        <br><br>
        <button class="menu-btn" style="width: auto; padding: 10px 20px; background: linear-gradient(135deg, #4caf50, #2e7d32);" onclick="closeModal('fail-modal')">אני מתקנת עכשיו! 💪</button>
    </div>

    <script>
        let audioCtx = null;
        let isMusicPlaying = false;
        let musicNodes = []; 

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (type === 'success') {
                let freqs = [523.25, 659.25, 783.99, 1046.50];
                freqs.forEach((f, i) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.08);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i*0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    osc.start(audioCtx.currentTime + i*0.08);
                    osc.stop(audioCtx.currentTime + 0.5);
                });
            } else if (type === 'fail') {
                let freqs = [349.23, 293.66]; 
                freqs.forEach((f, i) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'sine'; 
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.12);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i*0.12);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                    osc.start(audioCtx.currentTime + i*0.12);
                    osc.stop(audioCtx.currentTime + 0.6);
                });
            }
        }

        function startBackgroundMusic() {
            initAudio();
            if (isMusicPlaying) return;
            isMusicPlaying = true;
            document.getElementById('music-control').textContent = "🎵 מוזיקה: מופעלת";

            let tempo = 120; 
            let quarterNote = 60 / tempo;
            let step = 0;

            let notes = [261.63, 293.66, 329.63, 392.00, 349.23, 329.63, 293.66, 261.63];

            function playNextBar() {
                if (!isMusicPlaying) return;
                
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle'; 
                osc.connect(gain); gain.connect(audioCtx.destination);

                let currentNote = notes[step % notes.length];
                if(step % 4 === 0) currentNote *= 0.5; 
                
                osc.frequency.setValueAtTime(currentNote, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + quarterNote * 0.8);
                
                osc.start();
                osc.stop(audioCtx.currentTime + quarterNote * 0.8);
                
                musicNodes.push(osc);
                step++;
                
                setTimeout(playNextBar, quarterNote * 1000);
            }
            playNextBar();
        }

        function stopBackgroundMusic() {
            isMusicPlaying = false;
            document.getElementById('music-control').textContent = "🎵 מוזיקה: כבויה";
            musicNodes.forEach(node => { try { node.stop(); } catch(e){} });
            musicNodes = [];
        }

        function toggleMusic() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (isMusicPlaying) {
                stopBackgroundMusic();
            } else {
                startBackgroundMusic();
            }
        }

        // מאגר לקוחות שפונים לטליה
        const customers = [
            { name: "מפלצת הגבינה", avatar: "👹", greet: "היי שפית טליה! תכיני לי בבקשה " },
            { name: "חד-קרן רעב", avatar: "🦄", greet: "טליה המוכשרת! אני רוצה בדיוק " },
            { name: "חתול הפיצות", avatar: "🐱", greet: "מיאו טליה! המלכות מבקשת " },
            { name: "חייזר השברים", avatar: "👽", greet: "שלום טליה מכדור הארץ! אני צריך " },
            { name: "דובי הרוטב", avatar: "🐻", greet: "יאמי טליה! תוכלי להכין לי " }
        ];

        // הגדרת הפרסים ומחיריהם בנקודות
        const prizeList = [
            { id: "prize-1", name: "🥖 מערוך הזהב", cost: 30 },
            { id: "prize-2", name: "🍄 פטרית הקסם", cost: 70 },
            { id: "prize-3", name: "🥫 רוטב סודי", cost: 120 },
            { id: "prize-4", name: "✨ בצק דיסקו זוהר", cost: 200 },
            { id: "prize-5", name: "👑 כתר מאסטר שפית שברים", cost: 350 }
        ];

        // טעינת התקדמות שמורה של טליה או אתחול מחדש
        let score = parseInt(localStorage.getItem('talia_pizza_score')) || 0;
        let streak = parseInt(localStorage.getItem('talia_pizza_streak')) || 0;
        let unlockedPrizes = JSON.parse(localStorage.getItem('talia_pizza_prizes')) || [];

        let currentLevel = 'easy';
        let currentDenominator = 4; 
        let requiredSlicesToTop = 0; 
        let toppedSlices = 0;
        let targetFractionNum = 0;
        let targetFractionDen = 0;

        const baseLevels = {
            easy: [2, 4],
            medium: [3, 4, 6, 8],
            hard: [5, 6, 8, 12],
            expert: [7, 9, 11, 12]
        };

        // עדכון תצוגה ראשונית
        updateStatsDisplay();
        renderPrizesShelf();

        function saveProgress() {
            localStorage.setItem('talia_pizza_score', score);
            localStorage.setItem('talia_pizza_streak', streak);
            localStorage.setItem('talia_pizza_prizes', JSON.stringify(unlockedPrizes));
        }

        function updateStatsDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
        }

        function renderPrizesShelf() {
            prizeList.forEach(prize => {
                const element = document.getElementById(prize.id);
                if (unlockedPrizes.includes(prize.id)) {
                    element.classList.add('unlocked');
                } else {
                    element.classList.remove('unlocked');
                }
            });

            // כתיבת טקסט המציג לטליה כמה פרסים פתוחים
            document.getElementById('prize-status-text').textContent = 
                `טליה פתחה ${unlockedPrizes.length} מתוך ${prizeList.length} הפתעות מטבח מיוחדות!`;
        }

        function checkForNewPrizes() {
            let newlyUnlocked = [];
            prizeList.forEach(prize => {
                if (score >= prize.cost && !unlockedPrizes.includes(prize.id)) {
                    unlockedPrizes.push(prize.id);
                    newlyUnlocked.push(prize.name);
                }
            });
            if (newlyUnlocked.length > 0) {
                saveProgress();
                renderPrizesShelf();
                return newlyUnlocked;
            }
            return null;
        }

        function startGame(level) {
            initAudio();
            currentLevel = level;
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            startNewRound();
        }

        function returnToHome() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('home-screen').classList.add('active');
            renderPrizesShelf();
        }

        Math.gcd = (a, b) => b ? Math.gcd(b, a % b) : a;

        function startNewRound() {
            toppedSlices = 0;
            
            const customer = customers[Math.floor(Math.random() * customers.length)];
            document.getElementById('customer-avatar').textContent = customer.avatar;
            document.getElementById('customer-name').textContent = customer.name;

            const choices = baseLevels[currentLevel];
            currentDenominator = choices[Math.floor(Math.random() * choices.length)];
            requiredSlicesToTop = Math.floor(Math.random() * currentDenominator) + 1;

            targetFractionNum = requiredSlicesToTop;
            targetFractionDen = currentDenominator;
            
            // צמצום שברים ברמות קשות כדי לאתגר את טליה באלגנטיות
            if (currentLevel === 'hard' || currentLevel === 'expert' || Math.random() > 0.5) {
                let gcd = Math.gcd(requiredSlicesToTop, currentDenominator);
                targetFractionNum = requiredSlicesToTop / gcd;
                targetFractionDen = currentDenominator / gcd;
            }

            // עדכון בועת הלקוח
            const bubble = document.getElementById('customer-bubble');
            bubble.innerHTML = `<span id="customer-name">${customer.name}</span>: "${customer.greet} 
                <div class="fraction">
                    <div class="numerator" id="req-num">${targetFractionNum}</div>
                    <div class="denominator" id="req-den">${targetFractionDen}</div>
                </div> 
                מהפיצה שלי עם פפרוני!"
                <div id="hint-text" style="font-size: 0.85rem; color: #ff8c00; margin-top: 5px;">(טליה, הפיצה חתוכה ל-${currentDenominator} פרוסות!)</div>`;

            buildPizza();
        }

        function getSlicePath(x, y, radius, startAngle, endAngle) {
            const startRad = (startAngle - 90) * Math.PI / 180.0;
            const endRad = (endAngle - 90) * Math.PI / 180.0;
            const x1 = x + radius * Math.cos(startRad);
            const y1 = y + radius * Math.sin(startRad);
            const x2 = x + radius * Math.cos(endRad);
            const y2 = y + radius * Math.sin(endRad);
            const largeArcFlag = endAngle - startAngle > 180 ? 1 : 0;
            return `M ${x} ${y} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;
        }

        function buildPizza() {
            const group = document.getElementById('slices-group');
            group.innerHTML = '';
            const angleStep = 360 / currentDenominator;

            for (let i = 0; i < currentDenominator; i++) {
                const startAngle = i * angleStep;
                const endAngle = startAngle + angleStep;
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", getSlicePath(50, 50, 48, startAngle, endAngle));
                path.classList.add("slice");

                path.addEventListener('click', () => {
                    if (path.classList.contains('pepperoni')) {
                        path.classList.remove('pepperoni'); toppedSlices--;
                    } else {
                        path.classList.add('pepperoni'); toppedSlices++;
                    }
                });
                group.appendChild(path);
            }
        }

        function spawnConfetti() {
            for(let i=0; i<30; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = ['#ffbc00', '#ff4500', '#4caf50', '#00bfff'][Math.floor(Math.random() * 4)];
                confetti.style.animationDelay = Math.random() * 0.3 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 1500);
            }
        }

        function checkAnswer() {
            if (toppedSlices === requiredSlicesToTop) {
                playSound('success');
                spawnConfetti();
                streak++;
                let addedPoints = 10 + (streak * 2);
                score += addedPoints;
                
                document.getElementById('success-text').innerHTML = `טליה, ההזמנה שהכנת מושלמת!<br>שמת בדיוק ${toppedSlices}/${currentDenominator} פפרוני!<br>הרווחת <b>${addedPoints}</b> נקודות!`;
                
                // בדיקת פרסים חדשים
                let prizesWon = checkForNewPrizes();
                let prizeModalText = document.getElementById('prize-unlock-text');
                let emojiContainer = document.getElementById('success-emoji');
                
                if (prizesWon) {
                    prizeModalText.innerHTML = `🎁 וואו, טליה! פתחת פרס חדש במטבח שלך:<br>🌟 ${prizesWon.join(', ')} 🌟`;
                    emojiContainer.textContent = "🏆";
                } else {
                    prizeModalText.innerHTML = "";
                    emojiContainer.textContent = "🤩";
                }

                saveProgress();
                updateStatsDisplay();
                showModal('success-modal');
            } else {
                playSound('fail');
                // הרצף מתאפס, אך הניקוד המרבי נשמר
                streak = 0;
                updateStatsDisplay();
                saveProgress();
                
                // הסבר מנחה לעזרה קוגניטיבית לילד
                let helperMessage = "";
                if (toppedSlices < requiredSlicesToTop) {
                    helperMessage = `טליה, שמת רק ${toppedSlices} פרוסות, חסר לך עוד כדי להגיע ל-${requiredSlicesToTop}! לחצי על עוד פרוסות פיצה.`;
                } else {
                    helperMessage = `טליה, שמת יותר מדי פפרוני (${toppedSlices} פרוסות). לחצי על חלק מפרוסות הפפרוני כדי להוריד אותן, עד שיישארו בדיוק ${requiredSlicesToTop}!`;
                }

                document.getElementById('fail-text').innerHTML = `טליה, כרגע שמת פפרוני על <b>${toppedSlices}/${currentDenominator}</b> מהפיצה.<br>הלקוח ביקש כמות ששווה בדיוק ל-<b>${targetFractionNum}/${targetFractionDen}</b> (כלומר ${requiredSlicesToTop} פרוסות מתוך ${currentDenominator}).`;
                document.getElementById('helper-text').textContent = helperMessage;
                
                // פתיחת חלון העזרה; טליה מנסה שוב על אותה הפיצה
                showModal('fail-modal');
            }
        }

        function showModal(id) {
            document.getElementById('modal-overlay').classList.add('active');
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById('modal-overlay').classList.remove('active');
            document.getElementById(id).classList.remove('active');
            
            // רק בהצלחה עוברים ללקוח הבא. בכישלון נשארים לתקן!
            if (id === 'success-modal') {
                startNewRound();
            }
        }
    </script>
</body>
</html>
