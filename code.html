<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שף פיצה של שברים - גרסת המאסטר!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Rubik:wght@700;900&display=swap');

        body {
            font-family: 'Rubik', 'Assistant', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            color: #ff4500;
            font-size: 2.8rem;
            margin-bottom: 5px;
            text-shadow: 0 4px 10px rgba(255, 69, 0, 0.4);
        }

        #subtitle {
            font-size: 1.1rem;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        #game-container {
            max-width: 600px;
            margin: 0 auto;
            background: #162447;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
            border: 2px solid #0f4c75;
        }

        #order-box {
            background-color: #1f4068;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.4rem;
            margin-bottom: 20px;
            border: 3px dashed #e43f5a;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .fraction {
            display: inline-block;
            vertical-align: middle;
            text-align: center;
            font-weight: 900;
            font-size: 2rem;
            color: #e43f5a;
            direction: ltr; 
            margin: 0 10px;
            background: #fff;
            padding: 5px 10px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .numerator { border-bottom: 4px solid #162447; padding: 0 5px; color: #e43f5a; }
        .denominator { padding: 0 5px; color: #162447; }

        #pizza-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 25px auto;
            background: #cd853f; 
            border-radius: 50%;
            padding: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .slice {
            fill: #fff0d4;
            stroke: #d0a370;
            stroke-width: 1.5;
            cursor: pointer;
            transition: fill 0.15s, transform 0.1s;
        }

        .slice:hover {
            fill: #ffe4b5;
            filter: brightness(1.05);
        }

        .slice.pepperoni {
            fill: url(#pepperoni-pattern);
        }

        #controls {
            margin-top: 25px;
        }

        button {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
            transition: all 0.2s;
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(76, 175, 80, 0.6);
        }
        button:active { transform: translateY(1px); }

        #feedback {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            min-height: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        #stats-bar {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #0f4c75;
            font-size: 1.2rem;
        }

        .stat-box {
            background: #1f4068;
            padding: 10px 15px;
            border-radius: 12px;
            min-width: 100px;
        }

        /* אפקט קונפטי חגיגי */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: fall 2s linear forwards;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>🍕 שף פיצה: אתגר המאסטר! 🍕</h1>
    <div id="subtitle">רמת קושי: מתקדמת (כולל צמצום שברים וחיתוכים מורכבים!)</div>
    
    <div id="game-container">
        <div id="order-box">
            <span>הלקוח רוצה שחלק של </span>
            <div class="fraction">
                <div class="numerator" id="req-num">1</div>
                <div class="denominator" id="req-den">2</div>
            </div>
            <span> מהפיצה כולה יהיה עם פפרוני!</span>
            <div id="hint-text" style="font-size: 0.95rem; color: #ffbc00; margin-top: 8px; font-weight: bold;"></div>
        </div>

        <div id="pizza-wrapper">
            <svg id="pizza-svg" viewBox="0 0 100 100">
                <defs>
                    <pattern id="pepperoni-pattern" width="15" height="15" patternUnits="userSpaceOnUse">
                        <rect width="15" height="15" fill="#e43f5a"/>
                        <circle cx="4" cy="4" r="2.5" fill="#a30000"/>
                        <circle cx="11" cy="10" r="2" fill="#a30000"/>
                    </pattern>
                </defs>
                <g id="slices-group"></g>
            </svg>
        </div>

        <div id="feedback"></div>

        <div id="controls">
            <button onclick="checkAnswer()">בדוק והגש פיצה! 🍽️</button>
        </div>

        <div id="stats-bar">
            <div class="stat-box">⭐ ניקוד: <span id="score" style="color: #4caf50; font-weight:bold;">0</span></div>
            <div class="stat-box">🔥 רצף (Streak): <span id="streak" style="color: #ffbc00; font-weight:bold;">0</span></div>
            <div class="stat-box">👑 תואר: <span id="rank" style="color: #00bfff; font-weight:bold;">שף מתחיל</span></div>
        </div>
    </div>

    <script>
        let score = 0;
        let streak = 0;
        let currentDenominator = 4; // לכמה פרוסות הפיצה חתוכה בפועל
        let targetFractionNum = 1;  // המונה שהלקוח ביקש
        let targetFractionDen = 2;  // המכנה שהלקוח ביקש
        let requiredSlicesToTop = 0;// כמה פרוסות בפועל צריך למלא
        let toppedSlices = 0;

        const slicesGroup = document.getElementById('slices-group');
        const reqNum = document.getElementById('req-num');
        const reqDen = document.getElementById('req-den');
        const hintText = document.getElementById('hint-text');
        const feedback = document.getElementById('feedback');
        const scoreDisplay = document.getElementById('score');
        const streakDisplay = document.getElementById('streak');
        const rankDisplay = document.getElementById('rank');

        // רמות חיתוך מתקדמות ומאתגרות יותר
        const baseDenominators = [2, 3, 4, 5, 6, 8, 12];

        function startNewRound() {
            feedback.innerHTML = "";
            toppedSlices = 0;
            
            // 1. קביעת החיתוך הפיזי של הפיצה (כמה פרוסות יהיו על המסך)
            currentDenominator = baseDenominators[Math.floor(Math.random() * baseDenominators.length)];
            
            // 2. הגרלת מספר הפרוסות שצריך למלא בפועל
            requiredSlicesToTop = Math.floor(Math.random() * currentDenominator) + 1;

            // 3. יצירת האתגר המתמטי: מציגים לילד שבר מצומצם במידת האפשר!
            let gcd = Math.gcd(requiredSlicesToTop, currentDenominator);
            targetFractionNum = requiredSlicesToTop / gcd;
            targetFractionDen = currentDenominator / gcd;

            // עדכון הטקסטים
            reqNum.textContent = targetFractionNum;
            reqDen.textContent = targetFractionDen;

            // הוספת רמז מאתגר אם יש צמצום שברים
            if (currentDenominator !== targetFractionDen) {
                hintText.textContent = `💡 שים לב! הפיצה חתוכה ל-${currentDenominator} פרוסות שוות!`;
            } else {
                hintText.textContent = `הפיצה חתוכה ל-${currentDenominator} פרוסות.`;
            }

            buildPizza();
        }

        // פונקציית מתמטית למציאת מחלק משותף מכסימלי לצמצום שברים
        Math.gcd = function(a, b) {
            return b ? Math.gcd(b, a % b) : a;
        };

        function getSlicePath(x, y, radius, startAngle, endAngle) {
            const startRad = (startAngle - 90) * Math.PI / 180.0;
            const endRad = (endAngle - 90) * Math.PI / 180.0;
            
            const x1 = x + radius * Math.cos(startRad);
            const y1 = y + radius * Math.sin(startRad);
            const x2 = x + radius * Math.cos(endRad);
            const y2 = y + radius * Math.sin(endRad);
            
            const largeArcFlag = endAngle - startAngle > 180 ? 1 : 0;
            return `M ${x} ${y} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;
        }

        function buildPizza() {
            slicesGroup.innerHTML = '';
            const angleStep = 360 / currentDenominator;

            for (let i = 0; i < currentDenominator; i++) {
                const startAngle = i * angleStep;
                const endAngle = startAngle + angleStep;
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const d = getSlicePath(50, 50, 48, startAngle, endAngle);
                
                path.setAttribute("d", d);
                path.classList.add("slice");

                path.addEventListener('click', () => {
                    if (path.classList.contains('pepperoni')) {
                        path.classList.remove('pepperoni');
                        toppedSlices--;
                    } else {
                        path.classList.add('pepperoni');
                        toppedSlices++;
                    }
                });

                slicesGroup.appendChild(path);
            }
        }

        function updateRank() {
            if (score >= 15) {
                rankDisplay.textContent = "👑 מאסטר שף פיצה!";
                rankDisplay.style.color = "#ff4500";
            } else if (score >= 8) {
                rankDisplay.textContent = "🍳 שף פיצרייה מקצוען";
                rankDisplay.style.color = "#ffbc00";
            } else if (score >= 3) {
                rankDisplay.textContent = "🍕 עוזר שף מתקדם";
                rankDisplay.style.color = "#00bfff";
            } else {
                rankDisplay.textContent = "👨‍🍳 שף מתחיל";
                rankDisplay.style.color = "#fff";
            }
        }

        // פונקציית בונוס ליצירת קונפטי חגיגי בניצחון
        function spawnConfetti() {
            for(let i=0; i<40; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = ['#ff0', '#f0f', '#0ff', '#0f0', '#ff4500'][Math.floor(Math.random() * 5)];
                confetti.style.transform = `scale(${Math.random() * 1 + 0.5})`;
                confetti.style.animationDelay = Math.random() * 0.4 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }
        }

        function checkAnswer() {
            if (toppedSlices === requiredSlicesToTop) {
                streak++;
                score += 1 + Math.floor(streak / 3); // בונוס נקודות על רצף הצלחות!
                
                let winMessages = [
                    "🏆 מדהים! פיצחת את השבר המצומצם!",
                    "🔥 מטורף! דיוק של מאסטר שף!",
                    "🎉 גאוני! הלקוח מרוצה עד הגג!",
                    "🌟 כל הכבוד! מתמטיקה טעימה במיוחד!"
                ];
                let msg = winMessages[Math.floor(Math.random() * winMessages.length)];
                
                feedback.innerHTML = `<span style='color: #4caf50;'>${msg} (+${1 + Math.floor(streak / 3)} נקודות)</span>`;
                
                scoreDisplay.textContent = score;
                streakDisplay.textContent = streak;
                updateRank();
                spawnConfetti();
                
                setTimeout(startNewRound, 2500);
            } else {
                streak = 0; // הרצף נקטע
                streakDisplay.textContent = streak;
                
                // הסבר לימודי מדויק מה הייתה הטעות
                feedback.innerHTML = `<span style='color: #e43f5a;'>אופס! שמת פפרוני על ${toppedSlices}/${currentDenominator} מהפיצה.<br>השבר המבוקש היה שווה ל-${requiredSlicesToTop}/${currentDenominator}. נסה שוב! 💪</span>`;
            }
        }

        startNewRound();
    </script>
</body>
</html>
